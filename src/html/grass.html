<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>翻草</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            cursor: grab;
        }

        .character {
            font-size: 150px;
            font-weight: bold;
            color: #333;
        }

        .c {
            color: green;
            margin: -80px;
        }

        .g {
            position: absolute;
            margin-top: -10px;
            color: orange;
            transform: rotateX(0deg);
            transition: transform 0.5s ease;
            backface-visibility: hidden;
        }

        .z {
            position: relative;
            top: 0;
            left: 0;
            margin-top: -30px;
            transform: rotateX(180deg);
            transition: transform 0.5s ease;
            backface-visibility: hidden;
        }

        .container:hover .g {
            transform: rotateX(180deg);
        }

        .container:hover .z {
            transform: rotateX(0deg);
        }

        @media (max-width: 768px) {
            .character {
                font-size: 80px;
            }

            .c {
                margin: -50px;
            }
            .z {
                margin-top: -10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="character c">艹</div>
        <div class="character g">古</div>
        <div class="character z">早</div>
    </div>
</body>

</html>
